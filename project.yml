name: Pulse
options:
  bundleIdPrefix: com.furkanakarios
  deploymentTarget:
    iOS: "17.0"
  defaultConfig: Debug
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    PRODUCT_BUNDLE_IDENTIFIER: com.furkanakarios.pulse
    DEVELOPMENT_TEAM: ""

targets:
  Pulse:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Pulse
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.furkanakarios.pulse
        INFOPLIST_FILE: Pulse/Resources/Info.plist
        SWIFT_VERSION: "5.9"
        CODE_SIGN_ALLOW_ENTITLEMENTS_MODIFICATION: YES
    info:
      path: Pulse/Resources/Info.plist
      properties:
        CFBundleName: Pulse
        CFBundleDisplayName: Pulse
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        NSUserNotificationsUsageDescription: "Pulse, su içme hatırlatıcıları, alışkanlık bildirimleri ve sabah özeti için bildirim gönderir."
        NSHealthShareUsageDescription: "Pulse, adım sayısı, kalori ve uyku verilerini göstermek için Apple Health'e erişmek istiyor."
        NSHealthUpdateUsageDescription: "Pulse, egzersiz seanslarını Apple Health'e kaydetmek istiyor."
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
    entitlements:
      path: Pulse/Resources/Pulse.entitlements
      properties:
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.access: []
